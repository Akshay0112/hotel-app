<div class="container mt-5">
    <app-home></app-home>
  
    <h2 class="mb-4">Reservation List</h2>
  
    <ul *ngIf="reservations.length; else noReservation" class="list-group">
      <li *ngFor="let reservation of reservations" class="list-group-item">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h5 class="mb-1">Guest: {{ reservation.guestName }}</h5>
            <p class="mb-1">Email: {{ reservation.guestEmail }}</p>
            <p class="mb-1">Room No: {{ reservation.roomNumber }}</p>
            <p class="mb-1">Check-In: {{ reservation.checkInDate | date: 'medium' }}</p>
            <p class="mb-1">Check-Out: {{ reservation.checkOutDate | date: 'medium' }}</p>
          </div>
          <div>
            <button class="btn btn-danger mr-2" (click)="deleteReservation(reservation.id)">Delete</button>
            <button class="btn btn-primary mr-2" [routerLink]="['/edit', reservation.id]">Edit</button>
            
          </div>
        </div>
      </li>
    </ul>
    <button class="btn btn-secondary" [routerLink]="['/']">Exit</button>
    <ng-template #noReservation>
      <p class="mt-4">No reservations available.</p>
    </ng-template>
  </div>
